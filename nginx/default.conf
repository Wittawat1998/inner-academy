server {
    listen 80;
    server_name _;

    # ── Dynamic media: photos, content images (volume-mounted, no rebuild) ──
    location /media/ {
        root /srv/public;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri $uri/ =404;
    }

    # ── Static: downloads (PDF, etc.) ───────────────────────────────
    location /downloads/ {
        root /srv/public;
        # Serve inline so PDFs open in browser; change to "attachment" to force download
        add_header Content-Disposition "inline";
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ =404;
    }

    # ── Nuxt SSR: everything else ────────────────────────────────────
    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket support (Nuxt HMR / SSE)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
