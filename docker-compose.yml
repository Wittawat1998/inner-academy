services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    expose:
      - "3000"
    volumes:
      # IPX (Nuxt Image) reads source files from here to optimise them
      - ./public/media:/app/output/public/media:ro
      - ./public/downloads:/app/output/public/downloads:ro

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Dynamic content — uploadable without rebuild
      - ./public/media:/srv/public/media:ro
      - ./public/downloads:/srv/public/downloads:ro
    depends_on:
      - app
