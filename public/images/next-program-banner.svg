<svg xmlns="http://www.w3.org/2000/svg" width="600" height="220" viewBox="0 0 600 220">
  <defs>
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a2e4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a961;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="overlayGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0.6" />
      <stop offset="60%" style="stop-color:#000;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#000;stop-opacity:0" />
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="50" cy="50" r="28"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="600" height="220" fill="url(#bannerGrad)"/>

  <!-- Subtle pattern overlay -->
  <rect width="600" height="220" fill="none" stroke="#c9a961" stroke-width="0.3" opacity="0.1"/>

  <!-- People silhouettes (7 figures) -->
  <!-- Person 1 -->
  <g transform="translate(40, 30)" opacity="0.35" fill="#c9d4e0">
    <ellipse cx="45" cy="35" rx="22" ry="28"/>
    <ellipse cx="45" cy="10" rx="14" ry="14"/>
  </g>
  <!-- Person 2 -->
  <g transform="translate(100, 20)" opacity="0.35" fill="#c9d4e0">
    <ellipse cx="45" cy="40" rx="24" ry="30"/>
    <ellipse cx="45" cy="10" rx="16" ry="15"/>
  </g>
  <!-- Person 3 -->
  <g transform="translate(170, 25)" opacity="0.35" fill="#c9d4e0">
    <ellipse cx="45" cy="37" rx="22" ry="28"/>
    <ellipse cx="45" cy="10" rx="14" ry="14"/>
  </g>
  <!-- Person 4 (center, taller) -->
  <g transform="translate(248, 10)" opacity="0.4" fill="#d4b87a">
    <ellipse cx="45" cy="48" rx="28" ry="36"/>
    <ellipse cx="45" cy="10" rx="18" ry="17"/>
  </g>
  <!-- Person 5 -->
  <g transform="translate(330, 25)" opacity="0.35" fill="#c9d4e0">
    <ellipse cx="45" cy="37" rx="22" ry="28"/>
    <ellipse cx="45" cy="10" rx="14" ry="14"/>
  </g>
  <!-- Person 6 -->
  <g transform="translate(400, 20)" opacity="0.35" fill="#c9d4e0">
    <ellipse cx="45" cy="40" rx="24" ry="30"/>
    <ellipse cx="45" cy="10" rx="16" ry="15"/>
  </g>
  <!-- Person 7 -->
  <g transform="translate(470, 30)" opacity="0.35" fill="#c9d4e0">
    <ellipse cx="45" cy="35" rx="22" ry="28"/>
    <ellipse cx="45" cy="10" rx="14" ry="14"/>
  </g>

  <!-- Subtitle line in Thai -->
  <text x="300" y="148" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#c9a961" opacity="0.9" letter-spacing="1">
    หลักสูตรสร้างคนให้องค์กรคุณโตอย่างยั่งยืน
  </text>
  <text x="300" y="164" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#c9d4e0" opacity="0.7" letter-spacing="0.5">
    ด้วยเทคนิคการถ่ายทอดและทีมโค้ชที่เชี่ยวชาญ
  </text>

  <!-- NEXT PROGRAM text at bottom (will be overlaid by component text, but good fallback) -->
  <rect x="0" y="170" width="600" height="50" fill="url(#overlayGrad)"/>
  <text x="24" y="204" font-family="sans-serif" font-weight="900" font-size="32" fill="white" letter-spacing="2" opacity="0.95">NEXT PROGRAM</text>
</svg>
